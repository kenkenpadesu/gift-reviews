<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おまめのお土産・手土産レビュー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- かわいい丸ゴシックフォント「M PLUS Rounded 1c」を導入 -->
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">

<style>
/* */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf7f2; /* ほっこりミルクティベージュ */
  --surface: #ffffff;
  --surface2: #fdfbf7; /* 温かみのあるオフホワイト */
  --border: rgba(229, 215, 195, 0.5); /* 優しいベージュの境界線 */
  --border2: rgba(229, 215, 195, 0.8);
  --text: #3c352d; /* 柔らかい焦げ茶 */
  --text-sub: #5c5246;
  --text-muted: #a09384;
  --accent: #e59364; /* やさしいあんずオレンジ */
  --accent-light: #fdf3ed;
  --accent-dim: rgba(229, 147, 100, 0.25);
  --omiyage: #5e8fbe; /* すこしミルキーな青 */
  --omiyage-bg: #eef5fc;
  --temiyage: #73aa51; /* すこしミルキーな緑 */
  --temiyage-bg: #f1f7ed;
  --gold: #f5c142; /* 温かいはちみつゴールド */
  --radius: 18px; /* ぷっくり丸く */
  --radius-sm: 10px;
  --shadow-sm: 0 4px 12px rgba(229, 215, 195, 0.25);
  --shadow-md: 0 8px 24px rgba(229, 147, 100, 0.1);
  --transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* はずむような可愛い動き */
}

html { scroll-behavior: smooth; }
body {
  font-family: 'M PLUS Rounded 1c', 'Noto Sans JP', sans-serif; /* 全体をまあるい丸ゴシックに */
  background: var(--bg);
  color: var(--text-sub);
  min-height: 100vh;
  line-height: 1.8;
  overflow-x: hidden;
}

/* ===== HEADER ===== */
.site-header {
  background: var(--surface);
  border-bottom: 2px dashed #ebdcc8; /* お菓子の箱のような破線 */
  padding: 2.5rem 2rem 2rem;
  max-width: 1400px;
  margin: 0 auto;
  border-radius: 0 0 var(--radius) var(--radius);
  box-shadow: var(--shadow-sm);
  position: relative;
}

/* ⚠️ ご指摘のお菓子の装飾絵文字(::before)はここから完全に削除しました */

.header-inner { display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
.eyebrow {
  font-size: 11px; letter-spacing: 0.2em; color: var(--accent);
  text-transform: uppercase; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
  font-weight: 700;
}
.eyebrow::before { content: '●'; font-size: 8px; color: var(--accent); }
.site-title {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: clamp(24px, 3.8vw, 36px);
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.02em;
  line-height: 1.3;
}
.site-title em { color: var(--accent); font-style: normal; position: relative; }
.site-title em::after {
  content: "";
  position: absolute;
  left: 0; bottom: -2px;
  width: 100%; height: 4px;
  background: var(--accent-dim);
  border-radius: 2px;
}
.site-desc { font-size: 13px; color: var(--text-muted); margin-top: 8px; letter-spacing: 0.04em; }
.last-updated { font-size: 11px; color: var(--text-muted); margin-top: 8px; letter-spacing: 0.04em; }
.last-updated span { color: var(--accent); font-weight: 700; }
.header-stats { display: flex; gap: 1.5rem; align-items: flex-end; }
.stat { text-align: right; background: var(--accent-light); padding: 8px 16px; border-radius: var(--radius-sm); border: 1px dashed var(--accent); }
.stat-num { font-size: 26px; font-weight: 700; color: var(--accent); line-height: 1; }
.stat-label { font-size: 10px; color: var(--text-muted); margin-top: 4px; letter-spacing: 0.08em; font-weight: 700; }

/* ===== FILTER BUTTON ===== */
.filter-button {
  position: fixed; top: 16px; right: 16px;
  background: var(--accent); color: #fff;
  border: none; padding: 0.7rem 1.4rem;
  font-weight: 700; font-family: inherit;
  font-size: 13px; border-radius: 50px; cursor: pointer;
  z-index: 1000; transition: var(--transition);
  letter-spacing: 0.04em; box-shadow: 0 4px 15px rgba(229, 147, 100, 0.4);
}
.filter-button:hover { background: var(--accent); transform: scale(1.05); }

.admin-button {
  position: fixed; top: 16px; right: 130px;
  background: var(--surface); color: var(--text-muted);
  border: 1px solid var(--border2); padding: 0.7rem 1.4rem;
  font-weight: 700; font-family: inherit;
  font-size: 13px; border-radius: 50px; cursor: pointer;
  z-index: 1000; transition: all 0.2s; letter-spacing: 0.04em;
  display: none;
  box-shadow: var(--shadow-sm);
}
.admin-button:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

/* ===== FILTER OVERLAY ===== */
.filter-overlay {
  position: fixed; top: 0; right: 0;
  width: 320px; height: 100vh;
  background: var(--surface);
  box-shadow: -4px 0 24px rgba(229, 215, 195, 0.3);
  z-index: 999;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.77,0,0.175,1);
  padding: 0; overflow-y: auto;
  border-left: 1px solid var(--border);
}
.filter-overlay.open { transform: translateX(0); }
.filter-close {
  position: sticky; top: 0;
  display: block; width: 100%;
  background: var(--bg);
  border: none; border-bottom: 1px solid var(--border);
  color: var(--accent); padding: 1rem 1.5rem;
  cursor: pointer; font-size: 14px;
  font-family: inherit;
  font-weight: 700; text-align: left;
  letter-spacing: 0.05em;
}
.filter-inner { padding: 1.5rem; }
.filter-section { margin-bottom: 2rem; }
.filter-section-title {
  font-size: 11px; font-weight: 700; color: var(--accent);
  margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em;
}
.filter-options { display: flex; flex-direction: column; gap: 0.6rem; }
.filter-options label {
  display: flex; align-items: center; color: var(--text-sub);
  cursor: pointer; font-size: 13.5px; transition: color 0.2s;
}
.filter-options label:hover { color: var(--text); }
.filter-options input[type="checkbox"] {
  margin-right: 0.75rem; accent-color: var(--accent);
  width: 1.2em; height: 1.2em; border-radius: 4px;
}
.sort-buttons { display: flex; flex-direction: column; gap: 0.5rem; }
.sort-button {
  background: transparent; border: 1px solid var(--border2);
  color: var(--text-sub); padding: 0.6rem 1rem; border-radius: var(--radius-sm);
  cursor: pointer; font-family: inherit;
  font-size: 13px; text-align: left;
  transition: all 0.2s;
}
.sort-button:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* ===== 🔍 可愛い検索窓セクション ===== */
.search-section {
  max-width: 1400px;
  margin: 1rem auto 0;
  padding: 0 2rem;
}
.search-container {
  display: flex;
  align-items: center;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 0.4rem 1.2rem;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
}
.search-container:focus-within {
  border-color: var(--accent);
  box-shadow: 0 4px 16px rgba(229, 147, 100, 0.15);
  transform: translateY(-1px);
}
.search-icon {
  font-size: 18px;
  margin-right: 10px;
  color: var(--accent);
}
.search-input {
  flex: 1;
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  background: transparent;
}
.search-input::placeholder {
  color: var(--text-muted);
}

/* ===== CONTROLS ===== */
.controls {
  max-width: 1400px; margin: 0 auto;
  padding: 1.2rem 2rem;
  display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  background: transparent;
  position: sticky; top: 0; z-index: 100;
}
.chip {
  font-size: 12.5px; padding: 6px 16px; border-radius: 20px;
  border: 2px solid var(--border); background: var(--surface);
  color: var(--text-sub); cursor: pointer; letter-spacing: 0.04em;
  transition: var(--transition); font-family: inherit; font-weight: 500;
  box-shadow: var(--shadow-sm);
}
.chip:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.03); }
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
.result-count { margin-left: auto; font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; font-weight: 700; }

/* ===== RATING LEGEND ===== */
.rating-legend {
  max-width: 1400px; margin: 0 auto;
  padding: 0.6rem 2rem;
  display: flex; flex-wrap: wrap; gap: 4px 0; align-items: center;
  background: #f4eee3; /* さらにマイルドなベージュに */
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  border-radius: var(--radius-sm);
  margin-bottom: 1rem;
}
.legend-item { display: flex; align-items: center; gap: 4px; color: var(--text-sub); font-weight: 500; }
.legend-stars { color: var(--gold); font-size: 11px; }
.legend-sep { color: var(--border); margin: 0 10px; }

/* ===== MAIN LIST ===== */
main { max-width: 1400px; margin: 0 auto; padding: 0.5rem 2rem 4rem; }

/* */
/* 🔄 PC2列 / スマホ1列のグリッドレイアウト */
.gift-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1.8rem;
}
@media (min-width: 768px) {
  .gift-list {
    grid-template-columns: repeat(2, 1fr);
    gap: 2rem;
  }
}

/* ===== CARD ===== */
.gift-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 2px solid var(--border);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: var(--transition);
  box-shadow: var(--shadow-sm);
  position: relative;
}
.gift-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow-md);
  transform: translateY(-4px); /* ふわっと浮き上がる */
}

/* 📸 画像を上部に大きく配置 */
.card-poster {
  width: 100%;
  height: 250px; /* 大きく見栄えのする比率 */
  background: var(--surface2);
  overflow: hidden;
  border-bottom: 2px solid var(--border);
  position: relative;
}
.card-poster img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
  transition: transform 0.6s ease;
}
.gift-card:hover .card-poster img {
  transform: scale(1.05); /* かわいいズームズーム効果 */
}
.card-poster-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 3.5rem; background: var(--surface2);
}

/* アコーディオン開閉のトリガー部分 */
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 1.3rem;
  cursor: pointer;
  transition: background 0.2s;
}
.card-header:hover { background: var(--accent-light); }

.card-header-info { flex: 1; min-width: 0; }
.card-title-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }

.gift-title {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.category-badge { font-size: 10px; padding: 3px 10px; border-radius: 50px; font-weight: 700; flex-shrink: 0; letter-spacing: 0.05em; }
.badge-omiyage { background: var(--omiyage-bg); color: var(--omiyage); border: 1px solid rgba(94, 143, 190, 0.2); }
.badge-temiyage { background: var(--temiyage-bg); color: var(--temiyage); border: 1px solid rgba(115, 170, 81, 0.2); }
.badge-other { background: rgba(150,150,150,0.1); color: #888; border: 1px solid rgba(150,150,150,0.2); }

.card-bottom-row { display: flex; align-items: center; gap: 10px; }
.stars { display: flex; gap: 1px; align-items: center; }
.star-on  { font-size: 14px; color: var(--gold); }
.star-off { font-size: 14px; color: #e5dec9; }
.rating-num { font-size: 11px; color: var(--text-muted); margin-left: 4px; font-weight: 700; }
.shop-name { font-size: 11px; color: var(--text-muted); font-weight: 500; }

/* 🔄 矢印マーク (右端に配置) */
.card-chevron {
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
  transition: transform 0.3s ease;
  margin-left: 4px;
  background: var(--bg);
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
}
.card-chevron.open { transform: rotate(180deg); background: var(--accent); color: #fff; }

/* 🔄 アコーディオン詳細 (クリック時にガバッと一緒に開く) */
.card-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
  background: var(--surface);
}
.card-detail.open {
  border-top: 2px dashed var(--border);
}

.card-detail-inner {
  padding: 1.4rem;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.card-meta { font-size: 12px; color: var(--text-sub); line-height: 1.6; }
.meta-label { color: var(--accent); font-weight: 700; margin-right: 4px; }

.card-price {
  font-size: 16px; font-weight: 700; color: var(--text);
  font-family: 'M PLUS Rounded 1c', sans-serif;
}
.card-price span { font-size: 11px; color: var(--text-muted); font-weight: 400; margin-left: 3px; }

.card-description {
  font-size: 13px;
  color: var(--text-sub);
  line-height: 1.8;
}

.card-divider { width: 100%; height: 2px; border-top: 2px dashed var(--border); }

/* レビューセクションの可愛い装飾 */
.card-review {
  font-size: 13px;
  color: var(--text-sub);
  line-height: 1.8;
  padding: 1.1rem;
  background: var(--accent-light);
  border-left: 4px solid var(--accent);
  border-radius: 0 12px 12px 0;
  position: relative;
}
.card-review::before {
  content: "✏️";
  position: absolute;
  top: -10px; right: 10px;
  font-size: 14px;
}

/* 🗺️ 地図をさらにコンパクトに */
.card-map {
  width: 100%;
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid var(--border);
}
.card-map iframe {
  width: 100%;
  height: 140px; /* 圧迫感のないコンパクトサイズ */
  display: block;
  border: none;
}

/* いいねボタン */
.like-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--bg); border: 2px solid transparent;
  color: var(--text-muted); border-radius: 20px;
  padding: 6px 14px; font-size: 12px; cursor: pointer;
  transition: all 0.2s; font-family: inherit; font-weight: 700;
}
.like-btn:hover { border-color: #e05a7a; color: #e05a7a; background: #fff5f6; }
.like-btn.liked { background: #ffebeb; border-color: #e05a7a; color: #e05a7a; }

/* 編集ボタン */
.edit-btn {
  display: none; background: transparent;
  border: 1px solid var(--border2); color: var(--text-muted);
  font-size: 11px; padding: 4px 12px; border-radius: 20px;
  cursor: pointer; font-family: inherit;
  transition: all 0.15s; font-weight: 700;
}
.edit-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.admin-mode .edit-btn { display: inline-block; }

/* チェックボックス（削除モード） */
.card-checkbox-wrap {
  display: none; align-items: center; justify-content: center;
  width: 36px; min-width: 36px; cursor: pointer;
  position: absolute;
  top: 12px; left: 12px;
  z-index: 10;
  background: rgba(255, 255, 255, 0.95);
  border-radius: 8px;
  padding: 4px;
  border: 2px solid var(--border);
}
.card-checkbox-wrap input[type="checkbox"] { width: 18px; height: 18px; accent-color: #e05a7a; cursor: pointer; }
.delete-mode .card-checkbox-wrap { display: flex; }
.delete-mode .gift-card.selected { border-color: #e05a7a; background: rgba(224,90,122,0.03); }

/* 削除バー */
.delete-bar {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 2px solid var(--border);
  padding: 1.2rem 2rem; z-index: 1000;
  align-items: center; justify-content: space-between; gap: 1rem;
  box-shadow: 0 -4px 20px rgba(229, 215, 195, 0.3);
  border-radius: var(--radius) var(--radius) 0 0;
}
.delete-bar.visible { display: flex; }
.delete-bar-info { font-size: 13px; color: var(--text-sub); font-weight: 700; }
.delete-bar-info strong { color: #e05a7a; }
.delete-bar-btns { display: flex; gap: 10px; }
.delete-cancel-btn {
  background: transparent; border: 2px solid var(--border2);
  color: var(--text-muted); padding: 0.6rem 1.4rem;
  border-radius: 50px; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 700;
}
.delete-exec-btn {
  background: #e05a7a; border: none; color: #fff;
  padding: 0.6rem 1.6rem; border-radius: 50px; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 700;
}
.delete-exec-btn:disabled { opacity: 0.5; pointer-events: none; }

/* ===== モーダル ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(60, 53, 45, 0.4);
  z-index: 2000; display: flex; align-items: center; justify-content: center;
  padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 2rem;
  width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 10px 40px rgba(60, 53, 45, 0.15);
}
.modal-title {
  font-size: 18px; font-weight: 700; color: var(--text);
  margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center;
  font-family: 'M PLUS Rounded 1c', sans-serif;
}
.modal-close { background: transparent; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; }
.form-group { margin-bottom: 1.2rem; }
.form-label { display: block; font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; font-weight: 700; }
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--bg); border: 2px solid transparent;
  border-radius: var(--radius-sm); color: var(--text);
  font-family: inherit; font-size: 13px;
  padding: 10px 14px; outline: none; transition: var(--transition);
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); background: var(--surface); }
.form-textarea { resize: vertical; min-height: 90px; }
.form-row { display: flex; gap: 1rem; }
.form-row .form-group { flex: 1; }
.form-submit {
  width: 100%; background: var(--accent); color: #fff; border: none;
  padding: 0.9rem; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; margin-top: 0.5rem; transition: var(--transition);
  box-shadow: 0 4px 12px rgba(229, 147, 100, 0.3);
}
.form-submit:hover { background: var(--accent); transform: translateY(-1px); }
.form-submit:disabled { opacity: 0.5; pointer-events: none; }
.form-msg { font-size: 13px; text-align: center; margin-top: 0.75rem; font-weight: 700; }
.form-msg.success { color: #4a9e5c; }
.form-msg.error { color: #e05a7a; }
.pw-screen { text-align: center; padding: 1rem 0; }
.pw-screen p { font-size: 13px; color: var(--text-muted); margin-bottom: 1.2rem; }
.pw-input-wrap { display: flex; gap: 8px; }
.pw-input-wrap .form-input { flex: 1; }
.pw-enter { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 8px 18px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; }
.pw-error { color: #e05a7a; font-size: 12px; margin-top: 8px; font-weight: 700; }

/* ===== LOADING ===== */
.status-msg { text-align: center; padding: 4rem 2rem; color: var(--text-muted); font-size: 14px; grid-column: 1 / -1; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--accent-dim); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1.2rem; }
@keyframes spin { to { transform: rotate(360deg); } }

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitLine(lines[i]);
    if (!cols[COL.title] || cols[COL.title].trim() === '') continue;
    rows.push(cols);
  }
  return rows;
}

function splitLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim()); return result;
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderStars(n) {
  let h = '';
  for (let i = 1; i <= 5; i++) h += `<span class="${i<=n?'star-on':'star-off'}">★</span>`;
  return h;
}

function getBadgeClass(cat) {
  if (cat === 'お土産') return 'badge-omiyage';
  if (cat === '手土産') return 'badge-temiyage';
  return 'badge-other';
}

function formatMapIframe(mapInput) {
  if (!mapInput) return '';
  const trimmed = mapInput.trim();
  if (trimmed.startsWith('<iframe')) {
    let formatted = trimmed
      .replace(/width="[^"]*"/, 'width="100%"')
      .replace(/height="[^"]*"/, 'height="100%"');
    if (!formatted.includes('loading=')) {
      formatted = formatted.replace('<iframe', '<iframe loading="lazy"');
    }
    return formatted;
  }
  if (trimmed.startsWith('http')) {
    return `<iframe src="${trimmed}" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>`;
  }
  return '';
}

function applyFiltersAndSort() {
  const selCat = [...document.querySelectorAll('#category-filter input:checked')].map(cb=>cb.value).filter(v=>v!=='all');
  const selR   = [...document.querySelectorAll('#rating-filter input:checked')].map(cb=>parseFloat(cb.value)).filter(v=>!isNaN(v));

  let visible = allCards.filter(card => {
    const catOk = selCat.length===0 || selCat.includes(card.dataset.category);
    const rOk   = selR.length===0   || selR.includes(parseFloat(card.dataset.rating));
    const chipOk= currentFilter==='all' || card.dataset.category===currentFilter;
    
    // 🔍 検索フィルターロジック（商品名、店名、商品説明、感想でヒット）
    const q = searchQuery.toLowerCase().trim();
    const searchOk = !q || 
      card.dataset.titleJp.toLowerCase().includes(q) || 
      (card.dataset.shop && card.dataset.shop.toLowerCase().includes(q)) || 
      (card.dataset.desc && card.dataset.desc.toLowerCase().includes(q)) || 
      (card.dataset.review && card.dataset.review.toLowerCase().includes(q));

    return catOk && rOk && chipOk && searchOk;
  });

  switch (currentSort) {
    case 'rating-desc': visible.sort((a,b)=>parseFloat(b.dataset.rating)-parseFloat(a.dataset.rating)); break;
    case 'rating-asc':  visible.sort((a,b)=>parseFloat(a.dataset.rating)-parseFloat(b.dataset.rating)); break;
    case 'title-asc':   visible.sort((a,b)=>a.dataset.titleJp.localeCompare(b.dataset.titleJp,'ja')); break;
  }

  const listEl = document.getElementById('gift-list');
  listEl.innerHTML = '';
  if (visible.length === 0) {
    listEl.innerHTML = '<div class="no-results">条件にあうお土産が見つかりませんでした。🔍</div>';
  } else {
    visible.forEach(c => listEl.appendChild(c));
  }
  document.getElementById('result-count').textContent = `${visible.length}件`;
}

function toggleCard(header) {
  const detail = header.nextElementSibling;
  const chevron = header.querySelector('.card-chevron');
  
  const isOpen = detail.classList.contains('open');
  if (isOpen) {
    detail.style.maxHeight = '0px';
    detail.classList.remove('open');
    chevron.classList.remove('open');
  } else {
    detail.classList.add('open');
    detail.style.maxHeight = detail.scrollHeight + 'px';
    chevron.classList.add('open');
  }
}

function toggleSelect(e, wrap) {

async function loadLikes() {
  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    const likes = data.likes || data;
    document.querySelectorAll('.like-btn').forEach(btn => {
      const title = btn.dataset.title;
      btn.querySelector('.like-count').textContent = likes[title] || 0;
      if (likedTitles.has(title)) { btn.classList.add('liked'); btn.querySelector('.like-icon').textContent = '♥'; }
    });
    if (data.lastUpdated) {
      let display = data.lastUpdated;
      if (display.includes('T')) {
        const d = new Date(display);
        display = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      }
      document.getElementById('last-updated-data').textContent = display;
    } else { document.getElementById('last-updated-data').textContent = '—'; }
  } catch(e) { document.getElementById('last-updated-data').textContent = '取得失敗'; }
}

async function handleLike(btn) {
  const title = btn.dataset.title;
  if (btn.classList.contains('liked')) return;
  btn.style.opacity = '0.5'; btn.style.pointerEvents = 'none';
  try {
    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'like', title }) });
    const data = await res.json();
    if (data.success) {
      btn.querySelector('.like-count').textContent = data.likes;
      btn.querySelector('.like-icon').textContent = '♥';
      btn.classList.add('liked');
      likedTitles.add(title);
      localStorage.setItem('giftLikedTitles', JSON.stringify([...likedTitles]));
      gtag('event', 'like', { item_title: title });
    }
  } catch(e) {}
  btn.style.opacity = ''; btn.style.pointerEvents = '';
}

  const btn = document.getElementById('delete-exec-btn');

  try {
    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'delete', password: '241024', titles }) });
    const data = await res.json();
    if (data.success) {
      selected.forEach(c => { allCards = allCards.filter(ac=>ac!==c); c.remove(); });
      document.getElementById('delete-cancel-btn').click();
      updateStats();
      alert(`${data.deleted}件削除しました`);

});

// データ読み込み
(async () => {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const rows = parseCSV(text);
    const listEl = document.getElementById('gift-list');
    listEl.innerHTML = '';
    if (rows.length === 0) { listEl.innerHTML = '<div class="no-results">データが見つかりませんでした。</div>'; return; }
    rows.forEach(row => { const card = createCard(row); allCards.push(card); });
    updateStats();
    applyFiltersAndSort();
    loadLikes();
  } catch(e) {
    console.warn('CORSまたはシート取得エラーのため、仮のローカルデータを使用します:', e);
    const listEl = document.getElementById('gift-list');
    listEl.innerHTML = '';
    fallbackData.forEach(row => { const card = createCard(row); allCards.push(card); });
    updateStats();
    applyFiltersAndSort();
    loadLikes();
  }
})();
