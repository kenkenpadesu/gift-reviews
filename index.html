<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: linear-gradient(135deg, #fdf6f3 0%, #f8f4ff 100%);
  --surface: #ffffff;
  --surface2: #f8f4ff;
  --border: rgba(255, 107, 157, 0.08);
  --border2: rgba(255, 107, 157, 0.12);
  --text: #2d1b4e;
  --text-sub: #6b5b7c;
  --text-muted: #b197c9;
  --accent: #ff6b9d;
  --accent-light: rgba(255, 107, 157, 0.08);
  --accent-dim: rgba(255, 107, 157, 0.15);
  --omiyage: #0369a1;
  --omiyage-bg: #e0f2fe;
  --temiyage: #16a34a;
  --temiyage-bg: #f0fdf4;
  --gold: #ffd700;
  --radius: 16px;
  --radius-sm: 8px;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'M PLUS Rounded 1c', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text-sub);
  min-height: 100vh;
  line-height: 1.7;
  overflow-x: hidden;
}

/* ===== HEADER ===== */
.site-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 2.5rem 2rem 2rem;
  max-width: 1400px;
  margin: 0 auto;
}
.header-inner { display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
.eyebrow {
  font-size: 10px; letter-spacing: 0.25em; color: var(--accent);
  text-transform: uppercase; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-weight: 600;
}
.eyebrow::before { content: ''; display: block; width: 20px; height: 1px; background: var(--accent); }
.site-title {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: clamp(22px, 3.5vw, 34px);
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1.2;
}
.site-title em { color: var(--accent); font-style: normal; }
.site-desc { font-size: 13px; color: var(--text-muted); margin-top: 6px; letter-spacing: 0.04em; }
.last-updated { font-size: 11px; color: var(--text-muted); margin-top: 5px; letter-spacing: 0.04em; }
.last-updated span { color: var(--accent); font-weight: 600; }
.header-stats { display: flex; gap: 1.5rem; align-items: flex-end; }
.stat { text-align: right; }
.stat-num { font-size: 26px; font-weight: 700; color: var(--accent); line-height: 1; }
.stat-label { font-size: 11px; color: var(--text-muted); margin-top: 3px; letter-spacing: 0.08em; font-weight: 500; }

/* ===== FILTER BUTTON ===== */
.filter-button {
  position: fixed; top: 16px; right: 16px;
  background: var(--accent); color: white;
  border: none; padding: 0.65rem 1.3rem;
  font-weight: 700; font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 13px; border-radius: 50px; cursor: pointer;
  z-index: 1000; transition: background 0.2s, transform 0.2s;
  letter-spacing: 0.04em; box-shadow: 0 4px 16px rgba(255, 107, 157, 0.2);
}
.filter-button:hover { background: #f04a8a; transform: translateY(-1px); }

.admin-button {
  position: fixed; top: 16px; right: 130px;
  background: transparent; color: var(--text-muted);
  border: 1px solid var(--border2); padding: 0.65rem 1.3rem;
  font-weight: 700; font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 13px; border-radius: 50px; cursor: pointer;
  z-index: 1000; transition: all 0.2s; letter-spacing: 0.04em;
  display: none;
}
.admin-button:hover { border-color: var(--accent); color: var(--accent); }

/* ===== FILTER OVERLAY ===== */
.filter-overlay {
  position: fixed; top: 0; right: 0;
  width: 320px; height: 100vh;
  background: var(--surface);
  box-shadow: -4px 0 24px rgba(0,0,0,0.08);
  z-index: 999;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.77,0,0.175,1);
  padding: 0; overflow-y: auto;
  border-left: 1px solid var(--border);
}
.filter-overlay.open { transform: translateX(0); }
.filter-close {
  position: sticky; top: 0;
  display: block; width: 100%;
  background: var(--surface2);
  border: none; border-bottom: 1px solid var(--border);
  color: var(--accent); padding: 1rem 1.5rem;
  cursor: pointer; font-size: 14px;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-weight: 700; text-align: left;
  letter-spacing: 0.05em;
}
.filter-inner { padding: 1.5rem; }
.filter-section { margin-bottom: 2rem; }
.filter-section-title {
  font-size: 10px; font-weight: 700; color: var(--accent);
  margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em;
}
.filter-options { display: flex; flex-direction: column; gap: 0.5rem; }
.filter-options label {
  display: flex; align-items: center; color: var(--text-sub);
  cursor: pointer; font-size: 14px; transition: color 0.2s;
}
.filter-options label:hover { color: var(--text); }
.filter-options input[type="checkbox"] {
  margin-right: 0.75rem; accent-color: var(--accent);
  width: 1.1em; height: 1.1em;
}
.sort-buttons { display: flex; flex-direction: column; gap: 0.4rem; }
.sort-button {
  background: transparent; border: 1px solid var(--border2);
  color: var(--text-sub); padding: 0.55rem 1rem; border-radius: var(--radius-sm);
  cursor: pointer; font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 13px; text-align: left;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.sort-button:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* ===== CONTROLS ===== */
.controls {
  max-width: 1400px; margin: 0 auto;
  padding: 1rem 2rem;
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.chip {
  font-size: 12px; padding: 5px 14px; border-radius: 20px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--text-muted); cursor: pointer; letter-spacing: 0.04em;
  transition: all 0.15s; font-family: 'M PLUS Rounded 1c', sans-serif;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.active { background: var(--accent); color: white; border-color: var(--accent); font-weight: 700; }
.result-count { margin-left: auto; font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; }

/* ===== GIFT LIST & CARDS ===== */
.wrapper {
  max-width: 1400px; margin: 0 auto; padding: 2rem;
}

.gift-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2rem;
  list-style: none;
}

@media (min-width: 768px) {
  .gift-list {
    grid-template-columns: repeat(2, 1fr);
  }
}

.gift-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
}

.gift-card:hover {
  border-color: var(--accent);
  box-shadow: 0 8px 24px rgba(255, 107, 157, 0.1);
  transform: translateY(-4px);
}

/* Card Header with Badge and Button */
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 1.5rem;
  gap: 1rem;
}

.card-category-badge {
  padding: 0.35rem 0.8rem;
  border-radius: 16px;
  font-size: 0.75rem;
  font-weight: 600;
  white-space: nowrap;
  letter-spacing: 0.04em;
}

.card-category-badge.omiyage {
  background: var(--omiyage-bg);
  color: var(--omiyage);
}

.card-category-badge.temiyage {
  background: var(--temiyage-bg);
  color: var(--temiyage);
}

.card-expand-btn {
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  transition: color 0.2s;
  flex-shrink: 0;
}

.card-expand-btn:hover {
  color: var(--accent);
}

/* Card Poster (Image) */
.card-poster {
  width: 100%;
  height: 180px;
  background: linear-gradient(135deg, #fff0f5 0%, #f0f8ff 100%);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1.5rem;
  overflow: hidden;
  flex-shrink: 0;
  font-size: 3.5rem;
}

.card-poster img {
  width: auto;
  height: auto;
  max-width: 90%;
  max-height: 90%;
  object-fit: contain;
}

/* Card Title */
.card-title {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 0.75rem;
  line-height: 1.3;
}

/* Card Rating */
.card-rating {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 1rem;
}

.card-stars {
  display: flex;
  gap: 2px;
}

.card-star {
  color: var(--gold);
  font-size: 0.95rem;
}

.card-star.empty {
  color: #ddd;
}

.card-rating-text {
  font-size: 0.85rem;
  color: var(--text-muted);
  font-weight: 500;
}

/* Card Details */
.card-description {
  font-size: 0.9rem;
  color: var(--text-sub);
  line-height: 1.6;
  margin-bottom: 0.75rem;
  max-height: 200px;
  overflow: hidden;
  transition: all 0.3s ease;
}

.card-meta {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 0.75rem;
  font-weight: 500;
}

.card-review {
  font-size: 0.9rem;
  color: var(--text-sub);
  line-height: 1.5;
  margin-bottom: 0.75rem;
  max-height: 200px;
  overflow: hidden;
  transition: all 0.3s ease;
}

.card-price {
  font-size: 0.9rem;
  color: var(--text-muted);
  margin-bottom: 1rem;
  font-weight: 500;
}

/* Expanded State */
.gift-card.expanded {
  grid-column: 1 / -1;
}

.gift-card.expanded .card-description,
.gift-card.expanded .card-review {
  max-height: none;
  overflow: visible;
}

/* Delete Mode */
.gift-list.delete-mode .gift-card {
  cursor: default;
}

.gift-card.selected {
  border-color: var(--accent);
  background: var(--accent-light);
}

/* Modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(45, 27, 78, 0.5); display: none;
  z-index: 2000; align-items: center; justify-content: center;
}

.modal-overlay.open { display: flex; }

.modal-content {
  background: var(--surface); border-radius: var(--radius);
  padding: 2rem; max-width: 500px; width: 90%;
  max-height: 80vh; overflow-y: auto;
  box-shadow: 0 12px 48px rgba(255, 107, 157, 0.15);
}

.modal-title {
  font-size: 20px; font-weight: 700; color: var(--text);
  margin-bottom: 1.5rem;
}

/* Form */
.form-group {
  margin-bottom: 1.5rem;
}

.form-label {
  display: block; font-size: 12px; color: var(--text-muted);
  margin-bottom: 0.5rem; font-weight: 600; letter-spacing: 0.04em;
  text-transform: uppercase;
}

.form-input, .form-textarea, .form-select {
  width: 100%; padding: 0.75rem;
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text);
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 13px; transition: all 0.2s;
}

.form-input:focus, .form-textarea:focus, .form-select:focus {
  outline: none; border-color: var(--accent); background: var(--surface2);
}

.form-textarea { resize: vertical; min-height: 100px; }

.form-button {
  background: var(--accent); color: white;
  border: none; padding: 0.75rem 1.5rem;
  border-radius: var(--radius-sm); font-weight: 700;
  cursor: pointer; font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 13px; transition: all 0.2s;
  width: 100%;
}

.form-button:hover:not(:disabled) { background: #f04a8a; transform: translateY(-1px); }
.form-button:disabled { opacity: 0.6; cursor: not-allowed; }

.form-msg {
  margin-top: 1rem; padding: 0.75rem;
  border-radius: var(--radius-sm); font-size: 13px; text-align: center;
}

.form-msg.error { background: rgba(220, 80, 80, 0.1); color: #c85555; }
.form-msg.success { background: rgba(80, 200, 80, 0.1); color: #4a9b4f; }

/* Delete Bar */
.delete-bar {
  position: fixed; bottom: -80px; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 1rem 2rem; display: flex; gap: 1rem; align-items: center;
  transition: bottom 0.3s ease; z-index: 100;
}

.delete-bar.visible { bottom: 0; }

.delete-bar-text { color: var(--text-muted); font-size: 14px; }
.delete-bar-buttons { margin-left: auto; display: flex; gap: 0.5rem; }

.delete-btn {
  padding: 0.5rem 1rem; border-radius: var(--radius-sm);
  border: none; cursor: pointer; font-size: 12px;
  font-weight: 700; transition: all 0.2s;
}

.delete-btn.cancel { background: transparent; border: 1px solid var(--border2); color: var(--text-muted); }
.delete-btn.cancel:hover { border-color: var(--accent); color: var(--accent); }

.delete-btn.exec { background: #ff6b9d; color: white; }
.delete-btn.exec:hover { background: #f04a8a; }

/* No Results */
.no-results {
  text-align: center; padding: 3rem 2rem; color: var(--text-muted);
  font-size: 16px;
}

/* Responsive */
@media (max-width: 768px) {
  .wrapper { padding: 1rem; }
  .header-inner { flex-direction: column; align-items: flex-start; }
}

@media (max-width: 480px) {
  .admin-button { display: none !important; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div>
      <div class="eyebrow">レビュー</div>

<!-- FILTER BUTTON -->

<!-- FILTER OVERLAY -->
<div id="filter-overlay" class="filter-overlay">
  <button id="filter-close" class="filter-close">フィルターを閉じる</button>
  <div class="filter-inner">
    <div class="filter-section">
      <div class="filter-section-title">カテゴリ</div>

<!-- CONTROLS -->

</div>

</div>

<!-- DELETE MODE BUTTON -->

  <div id="add-form-screen" class="modal-content" style="display:none;">
    <h2 class="modal-title">商品を追加</h2>

      <input id="f-title" type="text" class="form-input" placeholder="例: 博多通りもん">
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <select id="f-category" class="form-select">
        <option value="omiyage">お土産</option>

    <div class="form-group">

    <div class="form-group">
      <label class="form-label">評価 (1-5)</label>
      <select id="f-rating" class="form-select">

        <option value="4">★★★★☆ (4)</option>
        <option value="3">★★★☆☆ (3)</option>
        <option value="2">★★☆☆☆ (2)</option>
        <option value="1">★☆☆☆☆ (1)</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">レビュー</label>
      <textarea id="f-review" class="form-textarea" placeholder="商品のレビュー"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">画像URL</label>
      <input id="f-image" type="text" class="form-input" placeholder="画像のURL">
    </div>
    <div id="form-msg" class="form-msg" style="display:none;"></div>
    <button id="form-submit" class="form-button">スプレッドシートに追加する</button>
    <button id="modal-close-form" class="form-button" style="background:var(--text-muted); margin-top:0.5rem;">キャンセル</button>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/1eNXkHfFBFxmMtq2R0PEPGfPPPPPPPPPP/export?format=csv';
const GAS_URL = 'https://script.google.com/macros/d/XXXXXXXXXXXXXXXXX/usercripts';
const urlParams = new URLSearchParams(window.location.search);
let allCards = [];
let isDeleteMode = false;

function parseCSV(text) {
  const rows = [];
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  for (let i = 1; i < lines.length; i++) {
    const values = lines[i].split(',').map(v => v.trim());
    const row = {};
    headers.forEach((h, idx) => { row[h] = values[idx] || ''; });
    if (row['商品名']) rows.push(row);
  }
  return rows;
}

function renderStars(rating) {
  const count = parseInt(rating) || 0;
  return Array.from({length: 5}, (_, i) => 
    `<span class="card-star${i < count ? '' : ' empty'}">★</span>`
  ).join('');
}

function createCard(row) {
  const li = document.createElement('li');
  li.className = 'gift-card';
  li.dataset.titleJp = row['商品名'] || '';
  li.dataset.category = row['カテゴリ'] || 'omiyage';
  li.dataset.rating = row['評価'] || '3';
  
  const category = row['カテゴリ'] || 'omiyage';
  const badgeClass = category === 'temiyage' ? 'temiyage' : 'omiyage';
  const badgeText = category === 'temiyage' ? '手土産' : 'お土産';
  
  li.innerHTML = `
    <div class="card-header">
      <span class="card-category-badge ${badgeClass}">${badgeText}</span>
      <button class="card-expand-btn" title="詳細を表示">▼</button>
    </div>
    <div class="card-poster">
      ${row['画像'] ? `<img src="${row['画像']}" alt="${row['商品名']}">` : '🍡'}
    </div>
    <h3 class="card-title">${row['商品名'] || '商品名'}</h3>
    <div class="card-rating">
      <div class="card-stars">${renderStars(row['評価'])}</div>
      ${row['店舗'] ? `<span class="card-rating-text">${row['店舗']}</span>` : ''}
    </div>
    ${row['説明'] ? `<p class="card-description">${row['説明']}</p>` : ''}
    ${row['価格'] ? `<div class="card-price">¥${row['価格']}</div>` : ''}
    ${row['レビュー'] ? `<p class="card-review">${row['レビュー']}</p>` : ''}
  `;
  
  const expandBtn = li.querySelector('.card-expand-btn');
  expandBtn.addEventListener('click', e => {
    e.stopPropagation();
    li.classList.toggle('expanded');
    expandBtn.textContent = li.classList.contains('expanded') ? '▲' : '▼';
  });
  
  return li;
}

function updateStats() {
  const totalCount = allCards.length;
  document.getElementById('total-count').textContent = totalCount;
  document.getElementById('last-updated').textContent = new Date().toLocaleDateString('ja-JP');
}

function applyFiltersAndSort() {
  const categoryFilters = Array.from(document.querySelectorAll('#category-filter input:checked')).map(i => i.value);
  const ratingFilters = Array.from(document.querySelectorAll('#rating-filter input:checked')).map(i => i.value);
  
  let filtered = allCards.filter(card => {
    const cat = card.dataset.category;
    const rating = card.dataset.rating;
    const catMatch = categoryFilters.length === 0 || categoryFilters.includes(cat);
    const ratingMatch = ratingFilters.length === 0 || ratingFilters.includes(rating);
    return catMatch && ratingMatch;
  });
  
  const gifList = document.getElementById('gift-list');
  gifList.innerHTML = '';
  if (filtered.length === 0) {
    gifList.innerHTML = '<div class="no-results">該当する商品がありません</div>';
    document.getElementById('result-count').textContent = '0';
    return;
  }
  
  filtered.forEach(card => gifList.appendChild(card));
  document.getElementById('result-count').textContent = filtered.length;
}

// Filter overlay
document.getElementById('filter-button').addEventListener('click', () => {
  document.getElementById('filter-overlay').classList.add('open');
});

document.getElementById('filter-close').addEventListener('click', () => {
  document.getElementById('filter-overlay').classList.remove('open');
});

document.getElementById('filter-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('filter-overlay')) {
    document.getElementById('filter-overlay').classList.remove('open');
  }
});

// Filter changes
const filterInputs = document.querySelectorAll('#category-filter input, #rating-filter input');
filterInputs.forEach(input => {
  input.addEventListener('change', applyFiltersAndSort);
});

// Sort buttons
document.querySelectorAll('.sort-button').forEach(btn => {
  btn.addEventListener('click', e => {
    const sort = e.target.dataset.sort;
    const sorted = [...allCards];
    
    if (sort === 'rating-desc') {
      sorted.sort((a, b) => parseInt(b.dataset.rating) - parseInt(a.dataset.rating));
    } else if (sort === 'rating-asc') {
      sorted.sort((a, b) => parseInt(a.dataset.rating) - parseInt(b.dataset.rating));
    } else if (sort === 'name-asc') {
      sorted.sort((a, b) => a.dataset.titleJp.localeCompare(b.dataset.titleJp));
    } else if (sort === 'name-desc') {
      sorted.sort((a, b) => b.dataset.titleJp.localeCompare(a.dataset.titleJp));
    }
    
    allCards = sorted;
    applyFiltersAndSort();
  });
});
